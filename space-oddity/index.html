<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE ODDITY // Mining Ops Terminal</title>
<link rel="stylesheet" href="css/hud.css">
</head>
<body>

<div id="app">

  <!-- ===== TOP BAR ===== -->
  <header id="topbar" class="hud-panel">
    <div class="topbar-item"><span class="label">CREDITS</span> <span id="top-credits" class="value accent-orange">0</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-item"><span class="label">LOCATION</span> <span id="top-location" class="value">Asterion Station</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-item"><span class="label">STATUS</span> <span id="top-status" class="value accent-green">Docked</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-item"><span id="top-timer" class="value accent-cyan"></span></div>
  </header>

  <!-- ===== LEFT PANEL ===== -->
  <aside id="left-panel">
    <section class="hud-panel widget">
      <h2 class="widget-title">SHIP SYSTEMS</h2>
      <div id="ship-status-body"></div>
    </section>
    <section class="hud-panel widget">
      <h2 class="widget-title">INVENTORY</h2>
      <div id="inventory-body"></div>
    </section>
    <section class="hud-panel widget" id="debug-widget">
      <h2 class="widget-title">DEBUG</h2>
      <div class="btn-row">
        <button class="hud-btn small" id="btn-skip">⏩ SKIP 1 MIN</button>
        <button class="hud-btn small danger" id="btn-reset">RESET GAME</button>
      </div>
    </section>
  </aside>

  <!-- ===== CENTER SCENE ===== -->
  <main id="scene-container">
    <canvas id="space-canvas"></canvas>
    <div id="scene-fade"></div>

    <!-- Player ship (SVG so parts are clickable) -->
    <div id="ship-wrap">
      <svg id="ship-svg" viewBox="0 0 200 90" width="150" height="68">
        <defs>
          <radialGradient id="flameGrad">
            <stop offset="0%" stop-color="#e8fbff"/>
            <stop offset="40%" stop-color="#7fe4ff"/>
            <stop offset="75%" stop-color="#26a8ff"/>
            <stop offset="100%" stop-color="rgba(38,128,255,0)"/>
          </radialGradient>
          <linearGradient id="hullGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#48688c"/>
            <stop offset="40%" stop-color="#22405e"/>
            <stop offset="100%" stop-color="#0a1c30"/>
          </linearGradient>
          <linearGradient id="finGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2a4a68"/>
            <stop offset="100%" stop-color="#0c2034"/>
          </linearGradient>
          <linearGradient id="canopyGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c8f4ff"/>
            <stop offset="50%" stop-color="#54b8e8"/>
            <stop offset="100%" stop-color="#14507c"/>
          </linearGradient>
          <linearGradient id="drillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#b8c8d8"/>
            <stop offset="50%" stop-color="#68809a"/>
            <stop offset="100%" stop-color="#2c4258"/>
          </linearGradient>
        </defs>

        <!-- engine exhaust -->
        <g id="engine-flame">
          <ellipse cx="20" cy="33" rx="18" ry="4" fill="url(#flameGrad)"/>
          <ellipse cx="20" cy="57" rx="18" ry="4" fill="url(#flameGrad)"/>
          <ellipse cx="24" cy="45" rx="12" ry="3" fill="url(#flameGrad)" opacity="0.7"/>
        </g>

        <!-- reactor (rear) -->
        <g id="part-reactor" class="ship-part">
          <!-- dorsal + ventral fins -->
          <path d="M46 30 L60 8 L78 12 L66 30 Z" fill="url(#finGrad)" stroke="#3ee6c4" stroke-width="1"/>
          <path d="M46 60 L60 82 L78 78 L66 60 Z" fill="url(#finGrad)" stroke="#3ee6c4" stroke-width="1"/>
          <circle cx="63" cy="13" r="1.5" fill="#ff5a6e" class="nav-light"/>
          <circle cx="63" cy="77" r="1.5" fill="#3ee6c4" class="nav-light delay"/>
          <!-- thruster nozzles -->
          <path d="M28 28 L38 26 L38 38 L28 36 Z" fill="#0b1d2e" stroke="#3ee6c4" stroke-width="1"/>
          <path d="M28 54 L38 52 L38 64 L28 62 Z" fill="#0b1d2e" stroke="#3ee6c4" stroke-width="1"/>
          <!-- engine block -->
          <path d="M36 24 L66 20 L66 70 L36 66 Z" fill="url(#hullGrad)" stroke="#3ee6c4" stroke-width="1.5"/>
          <line x1="40" y1="29" x2="62" y2="26" stroke="rgba(62,230,196,0.35)" stroke-width="1"/>
          <line x1="40" y1="61" x2="62" y2="64" stroke="rgba(62,230,196,0.35)" stroke-width="1"/>
          <!-- reactor core ring -->
          <circle cx="51" cy="45" r="9" fill="#081624" stroke="#3ee6c4" stroke-width="1.5"/>
          <circle cx="51" cy="45" r="6" fill="none" stroke="rgba(62,230,196,0.4)" stroke-width="1"/>
          <circle cx="51" cy="45" r="3.5" fill="#3ee6c4" class="reactor-core"/>
        </g>

        <!-- cargo (midsection) -->
        <g id="part-cargo" class="ship-part">
          <!-- main hull -->
          <path d="M66 18 L116 14 Q126 14 126 22 L126 68 Q126 76 116 76 L66 72 Z"
                fill="url(#hullGrad)" stroke="#ffb347" stroke-width="1.5"/>
          <!-- cockpit canopy -->
          <path d="M98 15 Q110 5 122 13 L120 22 L99 23 Z" fill="url(#canopyGrad)" stroke="#9fe8ff" stroke-width="1"/>
          <path d="M102 16 Q110 9 118 14" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
          <!-- cargo pods -->
          <rect x="72" y="30" width="15" height="13" rx="2" fill="#081624" stroke="#ffb347" stroke-width="1"/>
          <rect x="91" y="30" width="15" height="13" rx="2" fill="#081624" stroke="#ffb347" stroke-width="1"/>
          <rect x="72" y="48" width="15" height="13" rx="2" fill="#081624" stroke="#ffb347" stroke-width="1"/>
          <rect x="91" y="48" width="15" height="13" rx="2" fill="#081624" stroke="#ffb347" stroke-width="1"/>
          <line x1="74" y1="36" x2="85" y2="36" stroke="rgba(255,179,71,0.4)" stroke-width="1"/>
          <line x1="93" y1="36" x2="104" y2="36" stroke="rgba(255,179,71,0.4)" stroke-width="1"/>
          <line x1="74" y1="54" x2="85" y2="54" stroke="rgba(255,179,71,0.4)" stroke-width="1"/>
          <line x1="93" y1="54" x2="104" y2="54" stroke="rgba(255,179,71,0.4)" stroke-width="1"/>
          <!-- panel lines + running lights -->
          <line x1="68" y1="24" x2="122" y2="21" stroke="rgba(255,179,71,0.25)" stroke-width="1"/>
          <line x1="68" y1="66" x2="122" y2="69" stroke="rgba(255,179,71,0.25)" stroke-width="1"/>
          <circle cx="114" cy="38" r="1.6" fill="#ffd27f" class="nav-light"/>
          <circle cx="114" cy="52" r="1.6" fill="#ffd27f" class="nav-light delay"/>
        </g>

        <!-- drill (front) -->
        <g id="part-drill" class="ship-part">
          <!-- tapered nose -->
          <path d="M126 22 L158 32 L158 58 L126 68 Z" fill="url(#hullGrad)" stroke="#26c6ff" stroke-width="1.5"/>
          <line x1="130" y1="28" x2="154" y2="36" stroke="rgba(38,198,255,0.3)" stroke-width="1"/>
          <line x1="130" y1="62" x2="154" y2="54" stroke="rgba(38,198,255,0.3)" stroke-width="1"/>
          <!-- headlight -->
          <circle cx="140" cy="45" r="3.5" fill="#081624" stroke="#26c6ff" stroke-width="1"/>
          <circle cx="140" cy="45" r="1.8" fill="#9fe8ff" class="reactor-core"/>
          <!-- drill mount -->
          <rect x="154" y="33" width="8" height="24" rx="2" fill="#0e2436" stroke="#26c6ff" stroke-width="1.2"/>
          <!-- drill cone -->
          <g class="drill-bit">
            <path d="M162 33 L196 45 L162 57 Z" fill="url(#drillGrad)" stroke="#26c6ff" stroke-width="1.2"/>
            <path d="M163 37 L188 43" stroke="#22364a" stroke-width="1.4" fill="none"/>
            <path d="M163 45 L192 45" stroke="#22364a" stroke-width="1.4" fill="none"/>
            <path d="M163 53 L188 47" stroke="#22364a" stroke-width="1.4" fill="none"/>
          </g>
        </g>
      </svg>
      <div id="ship-tooltip"></div>
    </div>

    <div id="toast-container"></div>
  </main>

  <!-- ===== RIGHT PANEL ===== -->
  <aside id="right-panel">
    <nav id="panel-tabs" class="hud-panel">
      <button class="hud-btn tab" data-tab="mine">MINE</button>
      <button class="hud-btn tab" data-tab="market">MARKET</button>
      <button class="hud-btn tab" data-tab="upgrade">UPGRADES</button>
    </nav>
    <section class="hud-panel widget" id="right-widget">
      <div id="right-widget-body"></div>
    </section>
  </aside>

  <!-- ===== BOTTOM LOG ===== -->
  <footer id="bottom-log" class="hud-panel">
    <div id="log-lines"></div>
  </footer>

</div>

<div id="scanlines"></div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/logic.js"></script>
<script src="js/scene.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
