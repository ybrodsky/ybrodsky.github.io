<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Boy Color Composer</title>
    <meta
      name="description"
      content="Compose gameboy color music in your browser and export to C source code"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo-mark" aria-hidden="true">
          <span class="led led-1"></span><span class="led led-2"></span
          ><span class="led led-3"></span><span class="led led-4"></span>
        </span>
        <div class="brand-text">
          <h1>C</h1>
          <p>Game Boy Color composer</p>
        </div>
      </div>

      <div class="transport">
        <button
          id="btnPlay"
          class="t-btn play"
          title="Play from the playhead (Space)"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z" /></svg
          ><span>Play</span>
        </button>
        <button id="btnStop" class="t-btn" title="Stop and hold position">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="1.5" /></svg
          ><span>Stop</span>
        </button>
        <button id="btnRestart" class="t-btn" title="Jump to start and play">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6h2.4v12H6zM20 6 9 12l11 6z" /></svg
          ><span>Restart</span>
        </button>
        <button
          id="btnLoop"
          class="t-btn toggle"
          title="Loop the sheet"
          aria-pressed="true"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M7 7h8v3l5-4-5-4v3H5v6h2zm10 10H9v-3l-5 4 5 4v-3h10v-6h-2z"
            /></svg
          ><span>Loop</span>
        </button>
      </div>

      <div class="dials">
        <label class="dial">
          <span>Tempo</span>
          <span class="dial-row">
            <input id="tempo" type="range" min="50" max="220" value="132" />
            <output id="tempoVal">132</output>
            <span class="unit">BPM</span>
          </span>
        </label>
        <label class="dial">
          <span>Volume</span>
          <span class="dial-row">
            <input id="volume" type="range" min="0" max="100" value="70" />
            <output id="volVal">70</output>
          </span>
        </label>
        <button
          id="btnExport"
          class="t-btn ghost"
          title="Export this song as C source"
        >
          Export C
        </button>
        <button id="btnClear" class="t-btn ghost" title="Remove every note">
          Clear
        </button>
      </div>
    </header>

    <nav class="presetbar" id="presetbar" aria-label="Song presets"></nav>

    <main class="editor" id="editor">
      <div class="corner" id="corner">
        <span class="corner-hint">drag the<br />scanline ▸</span>
      </div>
      <div class="ruler-vp" id="rulerVp">
        <div class="ruler" id="ruler"></div>
      </div>
      <div class="gutter-vp" id="gutterVp">
        <div class="gutter" id="gutter"></div>
      </div>
      <div class="main-vp" id="mainVp">
        <div class="sheet" id="sheet">
          <div class="lanes" id="lanes"></div>
          <div
            class="playhead"
            id="playhead"
            title="Grab to scrub through time"
          >
            <div class="ph-handle" aria-hidden="true"></div>
            <div class="ph-line"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="hintbar">
      <span
        ><b>Click</b> a row to drop a note · <b>drag sideways</b> to lengthen ·
        <b>click a note</b> to erase</span
      >
      <span
        ><b>Drag the scanline</b> (or click the ruler) to move through time ·
        <b>Space</b> plays &amp; pauses</span
      >
    </footer>

    <dialog id="exportDlg" class="export-dlg">
      <div class="export-head">
        <div class="export-title">
          <h2>Export to C</h2>
          <p>
            Drop this into your GBDK / homebrew project · 1 step = one 16th note
          </p>
        </div>
        <div class="export-actions">
          <button
            id="btnCopyC"
            class="t-btn"
            title="Copy all C source to the clipboard"
          >
            Copy
          </button>
          <button id="btnCloseC" class="t-btn ghost" title="Close">
            Close
          </button>
        </div>
      </div>
      <pre id="exportPre" class="export-pre"></pre>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
